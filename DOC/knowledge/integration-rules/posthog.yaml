integration: posthog
category: analytics
package_name: posthog-js
client_packages:
  - posthog-js
server_packages:
  - posthog-node

use_cases:
  - product_analytics_events
  - funnels
  - retention
  - session_replay
  - feature_flags
  - a_b_experiments
  - dashboards

required_components:
  frontend:
    - posthog_provider_at_root
    - identify_call_after_sign_in
    - reset_call_after_sign_out
    - typed_event_helper
  backend:
    - posthog_node_client_singleton
    - server_side_capture_helper
    - feature_flag_evaluation_helper

env_vars:
  - NEXT_PUBLIC_POSTHOG_KEY
  - NEXT_PUBLIC_POSTHOG_HOST
  - POSTHOG_API_KEY

webhooks:
  endpoint: null
  events: []

setup_steps:
  - create_posthog_project
  - install_posthog_js_in_app
  - install_posthog_node_in_server_runtime
  - wrap_root_layout_with_posthog_provider
  - call_identify_with_user_id_and_traits_after_sign_in
  - call_reset_after_sign_out
  - define_typed_event_constants_to_avoid_string_drift
  - implement_server_side_capture_for_billing_and_lifecycle_events
  - configure_feature_flags_in_dashboard_if_used

constraints:
  - never_send_pii_in_event_properties_unless_explicitly_required
  - identify_must_use_stable_internal_user_id_not_email
  - server_side_events_must_be_used_for_billing_lifecycle_to_avoid_ad_blockers
  - reset_must_be_called_on_sign_out_to_prevent_cross_user_attribution

best_practices:
  - centralize_event_names_in_a_constants_file
  - emit_events_through_a_single_typed_helper
  - use_groups_for_organization_level_analytics_in_b2b_saas
  - prefer_server_side_capture_for_critical_events
  - document_each_event_in_a_tracking_plan

common_failures:
  - sending_events_with_inconsistent_names
  - identifying_with_email_breaking_user_continuity_on_email_change
  - missing_reset_on_sign_out
  - relying_only_on_client_capture_and_losing_events_to_ad_blockers
