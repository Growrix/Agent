integration: inngest
category: background_jobs
package_name: inngest
client_packages: []
server_packages:
  - inngest

use_cases:
  - background_jobs
  - delayed_jobs
  - scheduled_cron_jobs
  - event_driven_workflows
  - retries_with_backoff
  - fan_out_and_fan_in_steps
  - long_running_workflows_outside_request_lifecycle

required_components:
  backend:
    - inngest_client_singleton
    - app_api_inngest_route_handler
    - per_function_definition_under_src_inngest_functions
    - event_emit_helper_used_by_services
  database:
    - table_or_collection: jobs_log
      fields: [id, function_id, event_id, status, started_at, ended_at, error]
      optional: true

env_vars:
  - INNGEST_EVENT_KEY
  - INNGEST_SIGNING_KEY

webhooks:
  endpoint: /api/inngest
  events: []

setup_steps:
  - create_inngest_account_and_app
  - install_inngest_package
  - create_inngest_client_singleton
  - add_app_api_inngest_route_handler_serving_functions
  - define_functions_with_inngest_function_helpers
  - emit_events_from_services_when_async_work_is_required
  - configure_signing_and_event_keys_per_environment
  - register_app_in_inngest_cloud_and_point_to_deployed_url

constraints:
  - functions_must_be_idempotent_event_id_drives_dedupe
  - long_running_steps_must_be_split_via_step_run_for_durability
  - signing_key_must_only_be_used_server_side
  - never_block_request_threads_waiting_for_a_function

best_practices:
  - colocate_function_definitions_under_src_inngest_functions
  - use_step_run_for_each_external_call_to_get_retries
  - use_step_sleepUntil_for_delayed_actions_instead_of_setTimeout
  - tag_events_with_internal_user_or_org_id_for_filtering
  - alert_on_function_failure_rate_per_function

common_failures:
  - non_idempotent_handlers_double_processing_events
  - blocking_a_request_thread_waiting_for_a_job
  - using_setTimeout_for_delays_instead_of_step_sleepUntil
  - missing_signing_key_in_production
  - registering_function_url_to_local_tunnel_in_production_by_mistake
