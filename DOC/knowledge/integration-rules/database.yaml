integration: database
category: persistence
variants:
  - postgres
  - mongodb

postgres:
  package_name: postgres
  recommended_orm: prisma
  client_packages: []
  server_packages:
    - "@prisma/client"
  dev_packages:
    - prisma

  use_cases:
    - relational_data
    - transactions
    - strong_consistency
    - reporting_with_sql
    - row_level_security_when_using_supabase

  required_components:
    backend:
      - schema_file_prisma_or_drizzle
      - migration_folder
      - db_client_singleton
      - repository_layer_per_aggregate
    devops:
      - managed_postgres_instance
      - connection_pooler_when_serverless
      - separate_databases_for_dev_staging_prod

  env_vars:
    - DATABASE_URL
    - DIRECT_URL

  setup_steps:
    - provision_managed_postgres_instance
    - install_prisma_and_client_packages
    - initialize_prisma_schema
    - define_models_for_each_required_table
    - run_prisma_migrate_dev_for_local_schema
    - configure_connection_pooler_url_for_serverless_runtime
    - implement_db_client_singleton_to_avoid_connection_exhaustion
    - implement_repository_layer_per_aggregate
    - run_prisma_migrate_deploy_in_ci_for_production

  constraints:
    - never_run_prisma_migrate_dev_against_production
    - serverless_runtimes_must_use_pooler_url_for_runtime_and_direct_url_for_migrations
    - foreign_keys_must_be_enforced_for_referential_integrity
    - secrets_must_come_from_env_vars_only

  best_practices:
    - one_aggregate_per_repository_module
    - keep_migrations_under_version_control
    - seed_script_for_local_dev
    - index_columns_used_in_filters_and_joins
    - use_transactions_for_multi_table_writes

  common_failures:
    - exhausting_connections_in_serverless_without_pooler
    - schema_drift_between_dev_and_prod
    - missing_indexes_causing_slow_queries
    - storing_secrets_in_schema_file
    - using_the_same_database_for_multiple_environments

mongodb:
  package_name: mongodb
  recommended_odm: mongoose
  client_packages: []
  server_packages:
    - mongodb
    - mongoose

  use_cases:
    - flexible_document_schemas
    - rapid_iteration_on_data_shape
    - hierarchical_or_nested_data
    - high_write_throughput_with_eventual_consistency

  required_components:
    backend:
      - mongoose_models_per_collection
      - db_client_singleton
      - repository_layer_per_aggregate
    devops:
      - managed_mongodb_atlas_cluster
      - separate_databases_for_dev_staging_prod
      - ip_allowlist_or_private_endpoint

  env_vars:
    - MONGODB_URI
    - MONGODB_DB_NAME

  setup_steps:
    - provision_mongodb_atlas_cluster
    - configure_network_access_and_database_user
    - install_mongoose_or_mongodb_driver
    - define_schemas_and_models_for_each_collection
    - implement_db_client_singleton
    - implement_repository_layer_per_aggregate
    - configure_indexes_in_schema_definitions

  constraints:
    - schemaless_does_not_mean_validation_free_models_must_validate_writes
    - secrets_must_come_from_env_vars_only
    - production_clusters_must_have_ip_allowlist_or_private_endpoint

  best_practices:
    - define_indexes_in_schema_definitions_for_repeatability
    - use_transactions_only_when_needed_they_require_replica_sets
    - separate_read_and_write_concerns_for_high_throughput
    - document_each_collection_purpose_in_a_readme

  common_failures:
    - missing_indexes_causing_collection_scans
    - storing_secrets_in_connection_string_committed_to_git
    - schema_drift_between_application_and_collection
    - leaking_internal_object_ids_in_public_apis
