integration: axiom
category: logging_observability
package_name: "@axiomhq/js"
client_packages: []
server_packages:
  - "@axiomhq/js"
  - "@axiomhq/pino"
  - pino

use_cases:
  - structured_log_aggregation
  - search_and_filter_logs_via_apl
  - log_based_alerts
  - request_tracing_via_request_id
  - retention_for_compliance

required_components:
  backend:
    - logger_module_using_pino_and_axiom_transport
    - request_id_middleware_attaching_request_id_to_logs
    - structured_log_helpers_for_levels_info_warn_error
    - error_handler_emitting_log_with_request_id_user_id_route_latency

env_vars:
  - AXIOM_TOKEN
  - AXIOM_DATASET
  - AXIOM_ORG_ID

webhooks:
  endpoint: null
  events: []

setup_steps:
  - create_axiom_account_and_dataset
  - install_axiom_and_pino_packages
  - implement_logger_module_with_pino_and_axiom_transport
  - implement_request_id_middleware
  - integrate_logger_into_route_handlers_and_services
  - configure_log_based_alerts_in_axiom_dashboard
  - configure_retention_policy_per_compliance_requirement

constraints:
  - tokens_must_only_be_used_server_side
  - logs_must_never_include_pii_secrets_or_full_request_bodies
  - request_id_must_be_propagated_across_services_for_correlation
  - log_volume_per_request_must_be_bounded_to_avoid_runaway_costs

best_practices:
  - one_logger_module_used_everywhere
  - structured_fields_only_no_free_form_strings
  - tag_environment_release_and_route_on_every_log
  - sample_high_volume_low_value_logs

common_failures:
  - leaking_pii_or_secrets_into_logs
  - missing_request_id_breaking_correlation
  - unbounded_log_volume_per_request
  - using_console_log_in_production_paths_bypassing_aggregation
