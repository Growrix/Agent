integration: sanity
category: cms
package_name: "@sanity/client"
client_packages:
  - "@sanity/client"
  - "@sanity/image-url"
  - next-sanity
studio_packages:
  - sanity
  - "@sanity/vision"

use_cases:
  - blog_posts
  - marketing_pages
  - landing_page_blocks
  - documentation
  - case_studies
  - changelog
  - team_members
  - testimonials
  - structured_content_with_relations

required_components:
  cms_studio:
    - schema_definitions
    - desk_structure
    - preview_configuration
    - vision_tool
  frontend:
    - sanity_client_singleton
    - groq_query_helpers
    - image_url_builder
    - dynamic_route_per_document_type
    - draft_mode_route_handler
  backend:
    - revalidation_webhook_handler
    - preview_token_route

env_vars:
  - NEXT_PUBLIC_SANITY_PROJECT_ID
  - NEXT_PUBLIC_SANITY_DATASET
  - NEXT_PUBLIC_SANITY_API_VERSION
  - SANITY_API_READ_TOKEN
  - SANITY_API_WRITE_TOKEN
  - SANITY_REVALIDATE_SECRET

webhooks:
  endpoint: /api/webhooks/sanity
  events:
    - document.created
    - document.updated
    - document.deleted

required_schemas_when_blog_feature_present:
  - name: post
    fields:
      - { name: title, type: string, required: true }
      - { name: slug, type: slug, source: title, required: true }
      - { name: excerpt, type: text }
      - { name: coverImage, type: image }
      - { name: body, type: portableText }
      - { name: author, type: reference, to: author }
      - { name: categories, type: array, of: reference, to: category }
      - { name: publishedAt, type: datetime, required: true }
      - { name: seo, type: seo }
  - name: author
    fields:
      - { name: name, type: string, required: true }
      - { name: slug, type: slug, source: name, required: true }
      - { name: avatar, type: image }
      - { name: bio, type: portableText }
  - name: category
    fields:
      - { name: title, type: string, required: true }
      - { name: slug, type: slug, source: title, required: true }
      - { name: description, type: text }
  - name: seo
    fields:
      - { name: metaTitle, type: string }
      - { name: metaDescription, type: text }
      - { name: ogImage, type: image }

setup_steps:
  - create_sanity_project_and_dataset
  - install_sanity_studio_in_studio_folder
  - define_schemas_for_all_content_types
  - configure_desk_structure_for_editorial_ux
  - install_next_sanity_in_app
  - create_sanity_client_singleton_with_cdn_for_public_reads_and_token_for_drafts
  - implement_groq_queries_for_each_route
  - implement_dynamic_route_handlers_using_slug
  - implement_draft_mode_handler_with_preview_secret
  - configure_revalidation_webhook_in_sanity_dashboard
  - implement_revalidation_webhook_in_app
  - deploy_studio_to_sanity_managed_hosting_or_vercel

constraints:
  - every_content_type_must_have_a_slug_field
  - read_token_is_only_used_for_drafts_and_previews
  - write_token_is_only_used_in_secure_server_contexts
  - public_reads_must_use_cdn_endpoint_for_performance
  - revalidation_secret_must_match_between_app_and_sanity_dashboard
  - portable_text_renderers_must_be_implemented_for_each_block_type

best_practices:
  - colocate_groq_queries_per_route
  - use_typegen_or_typed_helpers_for_groq_results
  - keep_studio_schema_in_a_dedicated_folder
  - version_api_explicitly_via_NEXT_PUBLIC_SANITY_API_VERSION
  - use_image_url_builder_for_responsive_images
  - implement_draft_mode_only_for_authenticated_editors

common_failures:
  - missing_slug_field_on_content_type
  - exposing_write_token_to_client
  - forgetting_to_register_revalidation_webhook
  - querying_drafts_in_production_without_token
  - not_handling_unknown_portable_text_block_types
  - using_a_floating_api_version_causing_breaking_changes
