integration: meilisearch
category: search
package_name: meilisearch
client_packages:
  - meilisearch
  - "@meilisearch/instant-meilisearch"
server_packages:
  - meilisearch

use_cases:
  - full_text_search_with_typo_tolerance
  - faceted_search
  - search_as_you_type
  - multi_index_search
  - relevance_tuning_per_index

required_components:
  frontend:
    - search_box_component
    - search_results_component
    - facet_filter_components_optional
  backend:
    - meilisearch_client_singleton
    - per_index_schema_and_settings_definitions
    - indexing_service_consuming_db_change_events
    - search_proxy_route_or_authenticated_search_token_minting
  database: []

env_vars:
  - MEILISEARCH_HOST
  - MEILISEARCH_API_KEY
  - MEILISEARCH_ADMIN_KEY

webhooks:
  endpoint: null
  events: []

setup_steps:
  - provision_meilisearch_cloud_or_self_hosted
  - install_meilisearch_packages
  - create_meilisearch_client_singleton
  - define_indexes_with_searchable_attributes_filterable_attributes_and_ranking_rules
  - implement_indexing_service_to_keep_indexes_in_sync_with_db
  - implement_search_route_with_per_user_filters_or_minted_token
  - schedule_full_reindex_via_inngest_cron_for_recovery

constraints:
  - admin_key_must_only_be_used_server_side
  - public_search_must_use_minted_short_lived_token_with_filters_or_proxy_route_with_user_scope
  - documents_must_have_a_stable_primary_key
  - filterable_attributes_must_be_declared_before_querying_with_filters

best_practices:
  - keep_index_settings_in_code_and_apply_in_a_migration_step
  - reindex_in_batches_to_avoid_load_spikes
  - tune_ranking_rules_per_index_after_initial_data_load
  - emit_index_events_to_inngest_for_async_indexing_to_keep_request_paths_fast

common_failures:
  - exposing_admin_key_to_client
  - missing_filterable_attributes_breaking_user_scoped_filters
  - relying_on_realtime_indexing_in_request_path_causing_latency
  - reindex_storms_after_full_data_imports
