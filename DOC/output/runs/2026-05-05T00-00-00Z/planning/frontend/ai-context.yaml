folder: DOC/output/runs/2026-05-05T00-00-00Z/planning/frontend
purpose: Frontend planning artifacts for local-plumbing-marketing-site.
core_invariants:
  - master-ui-architecture.md owns site map and cross-page logic
  - design-system.md owns tokens
  - component-system.md owns shared components
  - motion-system.md owns motion catalog
  - content-library.md owns every visible string not sourced from CMS
  - pages/<route>.md owns per-page composition
  - components/<name>.md owns per-component spec
canonical_read_order:
  - master-ui-architecture.md
  - design-system.md
  - component-system.md
  - motion-system.md
  - content-library.md
  - interaction-matrix.md
  - pages/
  - components/
read_paths:
  build_a_page:
    - master-ui-architecture.md
    - design-system.md
    - component-system.md
    - motion-system.md
    - content-library.md
    - interaction-matrix.md
    - pages/<route>.md
  build_a_component:
    - design-system.md
    - component-system.md
    - motion-system.md
    - components/<name>.md
  audit_accessibility:
    - DOC/knowledge/frontend-rules/accessibility-rules.md
    - master-ui-architecture.md
    - motion-system.md
    - pages/
route_inventory:
  - /
  - /services
  - /services/[slug]
  - /areas
  - /areas/[slug]
  - /reviews
  - /about
  - /contact
  - /quote
  - /faq
  - /blog
  - /privacy
  - /terms
  - /404
