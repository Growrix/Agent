## Search Keywords by Task

**"How do I build the home page?"**
→ Read: pages/home.md, master-ui-architecture.md (routes, components), component-system.md (component specs)

**"What's the exact color for primary buttons?"**
→ Read: design-system.tokens.json (color.primary.500), design-system.md (button variants)

**"What animations should I include?"**
→ Read: motion-system.md (all macro + micro animations), per-page specs (motion temperament)

**"Where do I get content copy?"**
→ Read: content.en-US.json (all strings keyed), content-library.md (key index)

**"How do I handle form validation?"**
→ Read: pages/contact.md (form spec), interaction-matrix.md (form error states)

**"What are the accessibility requirements?"**
→ Read: master-ui-architecture.md (section 13), pages/*.md (accessibility plan sections), component-system.md (ARIA section)

**"How do I make this mobile-responsive?"**
→ Read: master-ui-architecture.md (breakpoints, layout system), pages/*.md (responsive intent sections)

**"What's the mobile navigation strategy?"**
→ Read: master-ui-architecture.md (section 5: Global Navigation Model, MobileBottomNav), component-system.md

