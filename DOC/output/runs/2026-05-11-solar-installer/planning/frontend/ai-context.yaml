## Navigation Structure for AI Agents

### Consumption Order (Sequential)

This sequence ensures correct context building for development and implementation:

```
1. brief.json                           (Project context, business goals, constraints)
2. site-inventory.md                    (Route classification, lead generation roles)
3. master-ui-architecture.md            (Navigation, journeys, layout system, shared components)
4. design-system.md                     (All design tokens, no raw values)
5. design-system.tokens.json            (Machine-readable token reference)
6. component-system.md                  (Component catalog, state matrix)
7. motion-system.md                     (Animation specs, timings, reduced-motion)
8. content-library.md                   (Content key index)
9. content.en-US.json                   (All visible strings, publish-ready)
10. visual-differentiation-map.md       (Route visual deltas, preventing template collapse)
11. interaction-matrix.md               (Form behaviors, keyboard nav, states)
12. pages/*.md                          (Per-route design briefs: home.md, contact.md, services.md, etc.)
13. visual-reference-pack.md            (Hero specs, mobile comps, asset direction)
```

### Quick Reference by Agent Role

**frontend_developer:** Consume full sequence (1-13) in order. Implement routes in priority order: home → contact → services → portfolio → remaining. Reference per-page specs (12) during implementation.

**backend_planner:** Focus on: brief.json (business context) → pages/*.md (data needs, form validation) → interaction-matrix.md (form flows, API contracts) → contact.md (lead capture endpoint spec).

**qa_planner:** Focus on: frontend.json (artifact count, constraints) → pages/*.md (section density validation) → component-system.md (state matrix coverage) → accessibility plan sections (AC1-AC12 validation).

**designer_review:** Focus on: master-ui-architecture.md (experience principles, journeys) → design-system.md (tokens only, no raw values) → visual-differentiation-map.md (route deltas) → pages/*.md (section blueprints).

