## Extensibility Notes

**Adding a New Route:**
1. Add entry to site-inventory.md (Tier 2 or 3)
2. Add page brief at pages/<route-slug>.md (follow per-page-spec.md template)
3. Reference content keys in content-library.md
4. Add content keys to content.en-US.json with publish-ready copy
5. Update visual-differentiation-map.md with delta vs all other routes
6. Update frontend.json route count

**Adding a New Component:**
1. Document in component-system.md (table entry)
2. Create components/<ComponentName>.md with full spec
3. Add component usage to relevant page briefs
4. Reference motion animations in motion-system.md if animated

**Adding a New Motion Animation:**
1. Add to motion-system.md (macro or micro section)
2. Include duration, easing, reduced-motion fallback
3. Reference in per-component specs (component-system.md)
4. Reference in per-page specs (pages/*.md motion temperament)

