openapi: 3.1.0
info:
  title: AU Plumber Website API
  version: 1.0.0
  description: Internal API for the Australian plumbing lead-generation website.

servers:
  - url: https://yourdomain.com.au
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: leads
    description: Lead enquiry and callback request endpoints
  - name: admin
    description: Admin-only lead management (requires Clerk auth)
  - name: webhooks
    description: Inbound webhook handlers from integrations
  - name: system
    description: System and utility endpoints

paths:
  /api/lead-enquiries:
    post:
      tags: [leads]
      summary: Submit a quote request
      description: Creates a lead enquiry record, sends a notification email, and fires analytics event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLeadEnquiryInput'
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadEnquiry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /api/callback-requests:
    post:
      tags: [leads]
      summary: Submit a callback request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCallbackRequestInput'
      responses:
        '201':
          description: Callback request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallbackRequest'
        '400':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /api/admin/leads:
    get:
      tags: [admin]
      summary: List leads (paginated)
      security:
        - clerkSession: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/LeadStatus'
      responses:
        '200':
          description: Paginated leads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLeads'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/admin/leads/{id}/status:
    post:
      tags: [admin]
      summary: Update lead status
      security:
        - clerkSession: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLeadStatusInput'
      responses:
        '200':
          description: Lead updated
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/webhooks/sanity:
    post:
      tags: [webhooks]
      summary: Sanity CMS revalidation webhook
      description: Triggered by Sanity on document publish/update/delete. Verifies signature and calls revalidatePath.
      responses:
        '200':
          description: Revalidation queued
        '400':
          description: Signature verification failed

  /api/webhooks/resend:
    post:
      tags: [webhooks]
      summary: Resend email delivery events
      description: Handles email.sent, email.delivered, email.bounced etc. and updates email_logs.
      responses:
        '200':
          description: Event processed

  /api/webhooks/clerk:
    post:
      tags: [webhooks]
      summary: Clerk user lifecycle events
      description: Syncs user.created/updated/deleted to local users table.
      responses:
        '200':
          description: Event processed

  /api/draft:
    get:
      tags: [system]
      summary: Enable Sanity draft mode
      security:
        - clerkSession: []
      parameters:
        - name: secret
          in: query
          required: true
          schema:
            type: string
        - name: slug
          in: query
          schema:
            type: string
      responses:
        '307':
          description: Redirect to draft page

  /api/health:
    get:
      tags: [system]
      summary: Health check
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  db:
                    type: string
                    example: ok
                  ts:
                    type: string
                    format: date-time

components:
  securitySchemes:
    clerkSession:
      type: apiKey
      in: cookie
      name: __session
      description: Clerk session cookie

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitError:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CreateLeadEnquiryInput:
      type: object
      required: [name, phone, email, suburb, service_slug, urgency, message, consent]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        phone:
          type: string
          pattern: '^(\+61|0)[2-9]\d{8}$'
        email:
          type: string
          format: email
        suburb:
          type: string
        service_slug:
          type: string
        urgency:
          type: string
          enum: [emergency, today, this_week, flexible]
        message:
          type: string
          maxLength: 2000
        consent:
          type: boolean
          enum: [true]
        honeypot:
          type: string
          description: Must be empty — bot detection
        source_page:
          type: string

    CreateCallbackRequestInput:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
          pattern: '^(\+61|0)[2-9]\d{8}$'
        preferred_time:
          type: string
        suburb:
          type: string
        message:
          type: string
          maxLength: 500
        source_page:
          type: string
        honeypot:
          type: string

    UpdateLeadStatusInput:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/LeadStatus'

    LeadStatus:
      type: string
      enum: [new, contacted, quoted, converted, closed]

    LeadEnquiry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        suburb:
          type: string
        service_slug:
          type: string
        urgency:
          type: string
        status:
          $ref: '#/components/schemas/LeadStatus'
        created_at:
          type: string
          format: date-time

    CallbackRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        preferred_time:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    PaginatedLeads:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/LeadEnquiry'
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
