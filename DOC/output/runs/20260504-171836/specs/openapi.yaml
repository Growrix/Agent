openapi: 3.1.0
info:
  title: Plumber AU API
  version: 1.0.0
  description: API for AU plumbing marketing and lead capture site.
servers:
  - url: https://plumber-au.example.com/api
    description: Production
  - url: http://localhost:3000/api
    description: Local
components:
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    LeadRequest:
      type: object
      required: [name, phone, suburb, postcode, serviceType, urgency]
      properties:
        name: { type: string }
        phone: { type: string }
        suburb: { type: string }
        postcode: { type: string }
        serviceType: { type: string }
        urgency: { type: string, enum: [low, normal, urgent] }
        message: { type: string }
    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status: { type: string, example: ok }
            service: { type: string, example: plumber-site }
    LeadResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            id: { type: string }
            received: { type: boolean }
paths:
  /health:
    get:
      summary: Health endpoint
      security: []
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /leads:
    post:
      summary: Submit quote/contact lead
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeadRequest'
      responses:
        '201':
          description: Lead accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeadResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /chat:
    post:
      summary: AI assistant chat streaming endpoint
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role: { type: string }
                      content: { type: string }
      responses:
        '200':
          description: Streaming text response
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /webhooks/sanity:
    post:
      summary: Sanity revalidation webhook
      security: []
      parameters:
        - name: x-sanity-signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Processed
        '400':
          description: Invalid signature
