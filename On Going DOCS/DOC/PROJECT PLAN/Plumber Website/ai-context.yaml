version: 1
project:
  name: Plumbing Service Website
  type: local-services marketing website
  summary: >-
    Australian plumbing website with emergency triage, postcode coverage,
    quote estimation, booking, reviews, WhatsApp escalation, and AI chat.
  status: documentation-first
  canonical_docs_root: On Going DOCS/DOC/PROJECT PLAN/Plumber Website/
  canonical_ai_entrypoint: On Going DOCS/DOC/PROJECT PLAN/Plumber Website/ai-context.yaml
  canonical_human_index: On Going DOCS/DOC/PROJECT PLAN/Plumber Website/README.md

prompt_contract:
  always_reference_first:
    - On Going DOCS/DOC/PROJECT PLAN/Plumber Website/ai-context.yaml
  minimum_instruction: >-
    Read the router file first, then follow the listed read path for the current
    frontend planning task before adding or revising any page plan.

core_invariants:
  - Mobile-first and thumb-friendly.
  - Keep call, WhatsApp, and AI chat entry points visible on every page.
  - Use a floating action cluster anchored to the bottom-right corner.
  - Support emergency and planned-service journeys equally well.
  - Show trust signals early: licensing, insured status, response time, service area, and reviews.
  - Use real-world plumbing photography and authentic proof; avoid fake product mockups.
  - Localize for Australia: AU postcode formatting, suburb/state naming, and local service language.
  - Maintain accessibility, clear hierarchy, and strong contrast.

surfaces:
  marketing:
    routes:
      - /
      - /services
      - /services/[slug]
      - /areas
      - /areas/[slug]
      - /reviews
      - /about
      - /blog
      - /blog/[slug]
  conversion:
    routes:
      - /quote
      - /book
      - /contact
      - /ai-concierge
  utility:
    routes:
      - /faq
      - /privacy
      - /terms
      - /404

read_paths:
  docs_review:
    - On Going DOCS/DOC/PROJECT PLAN/Plumber Website/ai-context.yaml
