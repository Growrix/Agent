    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Frontend/ai-context.yaml
    - DOC/PROJECT PLAN/Tasks/tasks.md
  implement_backend:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Backend/ai-context.yaml
    - DOC/PROJECT PLAN/API and Data/ai-context.yaml
    - DOC/PROJECT PLAN/Admin Dashboard/ai-context.yaml
    - DOC/PROJECT PLAN/Tasks/tasks.md
  harden_security:
