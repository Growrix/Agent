version: 1
project:
  name: Agency SaaS Website
  type: project-specific orchestration root
  summary: >-
    Canonical AI entrypoint for the generated project-specific documentation set.
    This file routes implementation and later planning tasks to the correct
    project artifacts after the universal role orchestration has completed.
  status: implementation-ready documentation root
  canonical_docs_root: DOC/PROJECT PLAN/
  canonical_ai_entrypoint: DOC/PROJECT PLAN/ai-context.yaml
  canonical_human_index: DOC/PROJECT PLAN/README.md

documentation_workflow:
  generation_entrypoint: DOC/Universal/Prompts/master_orchestration_prompt.md
  source_plan: DOC/MASTER PLAN/Plan.md
  universal_inputs:
    - DOC/Universal/GPT ROLES/ai-context.yaml
    - DOC/Universal/GPT ROLES/Documentation_Workflow_Playbook.md
    - DOC/Universal/Execution Constitution.md
  generation_result: >-
    A complete project-specific documentation system must exist under
    DOC/PROJECT PLAN/ before implementation begins.

planning_artifact_contract:
  required_for_end_to_end_planning: true
  location: DOC/PROJECT PLAN/
  naming_convention: <scope>-e2e-plan.md
  downstream_role_docs_required: true
  minimum_required_for_cms_content_operations:
    - DOC/PROJECT PLAN/Frontend/cms-content-operations-frontend.md
    - DOC/PROJECT PLAN/API and Data/cms-content-operations-api-data.md
    - DOC/PROJECT PLAN/Admin Dashboard/cms-content-operations-admin-dashboard.md
    - DOC/PROJECT PLAN/Security/cms-content-operations-security.md
  rule: >-
    Create or update a concrete planning artifact in DOC/PROJECT PLAN/ before
    updating DOC/PROJECT PLAN/Tasks/tasks.md. Chat summaries are secondary and
    are not the canonical project plan.
  downstream_rule: >-
    Create or update the affected role-specific planning docs in their owning
    DOC/PROJECT PLAN subfolders before the plan is considered complete or the
    tracker is updated.

execution_workflow:
  start_here_for_build: true
  minimum_instruction: >-
    Start with DOC/PROJECT PLAN/ai-context.yaml. Read the shared contracts first,
    then route to the role-specific project folder required by the current task.
    Do not return to the universal prompt for implementation work.
  execution_tracker:
    required: true
    ai_entry: DOC/PROJECT PLAN/Tasks/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Tasks/tasks.md
    rule: Update the execution tracker before starting a new phase and after finishing material work.
  implementation_gate:
    - Shared Contracts must exist
    - Frontend, Backend, API and Data, Security, DevOps, and QA docs must exist
    - QA and Security constraints must be treated as release gates, not optional notes

core_invariants:
  - Shared Contracts are the cross-role source of truth.
  - Project-specific docs override universal defaults when explicitly defined.
  - Implementation must follow project-specific docs, not ad hoc assumptions.
  - Contract changes must be reflected in affected docs before further feature buildout.
  - AI must use this file as the primary routing file once documentation generation is complete.
  - Execution status must be tracked in DOC/PROJECT PLAN/Tasks/tasks.md before and after each implementation phase.
  - Supabase is the default managed provider for auth and database persistence unless explicitly overridden.
  - Planning for an existing codebase must start with a reuse audit of routes, layouts, components, schemas, data modules, and integrations before proposing net-new architecture.
  - End-to-end planning must explicitly cover CMS/content operations, database ownership, schema evolution, operator workflows, and integration boundaries.
  - The planning stack decision must explicitly assess Next.js, React, TypeScript, Sanity CMS, Supabase, PostgreSQL, Prisma, Lark, Resend, Pusher, and S3.
  - Sanity CMS should be treated as a first-class content planning surface and must have explicit ownership decisions for blog, services, shop, case studies, FAQs, and other editorial surfaces.
  - Sanity Studio must be treated as an isolated app inside the repository: same approved Node major as the web app unless explicitly documented otherwise, own lockfile, own install flow, own CI and deploy surface, and no root postinstall coupling.
  - The common footer copyright standard is: © {year} {Company Name or Site Name}. All right reserved. Built & Maintenece by Growrix OS. Link Growrix OS to https://www.growrixos.com.

project_layers:
  universal_layer:
    purpose: reusable prompts, roles, and rules
    paths:
      - DOC/Universal/Prompts/
      - DOC/Universal/GPT ROLES/
      - DOC/Universal/Execution Constitution.md
  role_layer:
    purpose: orchestrated documentation-generation workers
    entrypoint: DOC/Universal/GPT ROLES/ai-context.yaml
  project_specific_layer:
    purpose: this project's implementation-ready documentation
    root: DOC/PROJECT PLAN/

project_docs:
  planning_artifacts:
    root: DOC/PROJECT PLAN/
    active_artifacts:
      - DOC/PROJECT PLAN/cms-content-operations-e2e-plan.md
    use_for:
      - canonical fresh, scale, or hybrid planning artifacts created after codebase audits
      - cross-role scope decisions that must exist before tracker updates or implementation
  downstream_role_docs:
    active_docs:
      - DOC/PROJECT PLAN/Frontend/cms-content-operations-frontend.md
      - DOC/PROJECT PLAN/API and Data/cms-content-operations-api-data.md
      - DOC/PROJECT PLAN/Admin Dashboard/cms-content-operations-admin-dashboard.md
      - DOC/PROJECT PLAN/Security/cms-content-operations-security.md
    use_for:
      - role-specific implementation planning derived from the active root planning artifact
      - role entrypoints that must exist before later implementation work starts
  tasks:
    ai_entry: DOC/PROJECT PLAN/Tasks/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Tasks/tasks.md
    use_for:
      - execution tracking
      - phase status
      - remaining work
      - release blockers
  shared_contracts:
    ai_entry: DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Shared Contracts/README.md
    use_for:
      - domain entities
      - route and surface boundaries
      - role and permission model
      - integration ownership
  frontend:
    ai_entry: DOC/PROJECT PLAN/Frontend/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Frontend/README.md
    use_for:
      - page planning
      - design system
      - UI components
      - frontend feature implementation
  backend:
    ai_entry: DOC/PROJECT PLAN/Backend/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Backend/README.md
    use_for:
      - service architecture
      - domain logic
      - integrations
      - backend feature implementation
  api_and_data:
    ai_entry: DOC/PROJECT PLAN/API and Data/ai-context.yaml
    human_index: DOC/PROJECT PLAN/API and Data/README.md
    use_for:
      - API endpoints
      - payload contracts
      - event flows
      - schema and persistence rules
  supabase:
    ai_entry: DOC/PROJECT PLAN/Supabase/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Supabase/README.md
    use_for:
      - auth provider planning
      - managed PostgreSQL ownership
      - environment and secret strategy
      - persistence constraints and fallback rules
  security:
    ai_entry: DOC/PROJECT PLAN/Security/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Security/README.md
    use_for:
      - auth and authorization
      - privacy and compliance
      - abuse protection
  devops:
    ai_entry: DOC/PROJECT PLAN/DevOps/ai-context.yaml
    human_index: DOC/PROJECT PLAN/DevOps/README.md
    use_for:
      - environments
      - CI/CD
      - observability
      - rollout and rollback
  qa:
    ai_entry: DOC/PROJECT PLAN/QA/ai-context.yaml
    human_index: DOC/PROJECT PLAN/QA/README.md
    use_for:
      - test strategy
      - release gates
      - end-to-end validation
  admin_dashboard:
    ai_entry: DOC/PROJECT PLAN/Admin Dashboard/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Admin Dashboard/README.md
    use_for:
      - admin operations planning
      - dashboard module boundaries
      - shop and portfolio management workflows
      - submissions inbox planning

read_paths:
  understand_project:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/README.md
    - memories/repo/site-brain.md
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Tasks/tasks.md
    - DOC/PROJECT PLAN/Supabase/ai-context.yaml
  track_execution:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/Tasks/ai-context.yaml
    - DOC/PROJECT PLAN/Tasks/tasks.md
  plan_end_to_end:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/README.md
    - DOC/PROJECT PLAN/Tasks/ai-context.yaml
    - DOC/PROJECT PLAN/Tasks/tasks.md
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Frontend/ai-context.yaml
    - DOC/PROJECT PLAN/Backend/ai-context.yaml
    - DOC/PROJECT PLAN/API and Data/ai-context.yaml
    - DOC/PROJECT PLAN/Supabase/ai-context.yaml
    - DOC/PROJECT PLAN/Admin Dashboard/ai-context.yaml
    - DOC/PROJECT PLAN/Security/ai-context.yaml
    - DOC/PROJECT PLAN/DevOps/ai-context.yaml
    - DOC/PROJECT PLAN/QA/ai-context.yaml
    - DOC/Universal/Template/e2e-planning-template.md
    - DOC/PROJECT PLAN/cms-content-operations-e2e-plan.md
    - DOC/PROJECT PLAN/Frontend/cms-content-operations-frontend.md
    - DOC/PROJECT PLAN/API and Data/cms-content-operations-api-data.md
    - DOC/PROJECT PLAN/Admin Dashboard/cms-content-operations-admin-dashboard.md
    - DOC/PROJECT PLAN/Security/cms-content-operations-security.md
  implement_frontend:
